services:
  backend:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}/silsilah-backend:${IMAGE_TAG}
    build:
      context: ../../backend
      dockerfile: ../.gitlab-ci/build/backend/Dockerfile
      args:
        REGISTRY: ${REGISTRY}
        IMAGE_NAMESPACE: ${IMAGE_NAMESPACE}

  frontend:
    image: ${REGISTRY}/${GITHUB_REPOSITORY}/silsilah-frontend:${IMAGE_TAG}
    build:
      context: ../../frontend
      dockerfile: ../.gitlab-ci/build/frontend/Dockerfile
      args:
        REGISTRY: ${REGISTRY}
        IMAGE_NAMESPACE: ${IMAGE_NAMESPACE}
